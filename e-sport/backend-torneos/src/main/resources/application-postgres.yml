server:
  port: 8081

spring:
  application:
    name: torneos-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/torneo
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT Configuration
jwt:
  secret: mySecretKeyForTorneosAppThatIsLongEnoughForHS256AlgorithmAndMoreSecure
  expiration: 3600000  # 1 hora
  refresh-expiration: 86400000  # 24 horas

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.torneos: INFO
    org.springframework.web: DEBUG